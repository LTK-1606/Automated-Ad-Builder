<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>🎬 Automated Ad Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container my-5">
    <h1 class="mb-4">🎬 Automated Ad Builder</h1>
    <div class="card p-4 shadow-sm">
        <form method="POST">
            <div class="row mb-4">
                <div class="col-md-6">
                    <label for="country" class="form-label fw-bold">Filter by Country:</label>
                    <select class="form-select" name="country" id="country">
                        <option value="Any" selected>Any Country</option>
                        {% for country in countries %}
                            <option value="{{ country }}">{{ country }}</option>
                        {% endfor %}
                    </select>
                </div>
                
                <div class="col-md-6">
                    <label for="subject" class="form-label fw-bold">Filter by Subject:</label>
                    <select class="form-select" name="subject" id="subject">
                        <option value="Any" selected>Any Subject</option>
                        <!-- Jinja loop populated by the backend -->
                        {% for subject in subjects %}
                            <option value="{{ subject }}">{{ subject }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>
            <div class="mb-3">
                <label for="script" class="form-label font-weight-bold">Paste your script (Put each scene/line on a new row):</label>
                <textarea class="form-control" id="script" name="script" rows="6" placeholder="Line 1: High energy shot...&#10;Line 2: Close up of product..."></textarea>
            </div>
            {% if error %}
                <div class="alert alert-danger">{{ error }}</div>
            {% endif %}
            <button type="submit" class="btn btn-primary w-100">Start Analysis</button>
        </form>
    </div>
    <button id="kill-app-btn" class="btn btn-danger shadow" style="position: fixed; bottom: 20px; right: 20px; z-index: 10000; border-radius: 8px; font-weight: bold;">
    ⏹ Quit App
    </button>
</body>
</html>

<script>
document.getElementById('kill-app-btn').addEventListener('click', function() {
    if (confirm("Are you sure you want to quit the application?")) {
        fetch('/shutdown', { method: 'POST' })
        .then(() => {
            showClosedScreen();
        })
        .catch(() => {
            showClosedScreen();
        });
    }
});

function showClosedScreen() {
    document.body.innerHTML = `
        <div style='display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background-color:#1a1a1a; color:white; font-family:sans-serif;'>
            <h2 style='margin-bottom: 10px;'>Application Closed</h2>
            <p style='color: #888;'>The background server has been terminated and the port is free.</p>
            <p style='color: #888;'>You can now safely close this browser tab.</p>
        </div>
    `;
}
</script>
