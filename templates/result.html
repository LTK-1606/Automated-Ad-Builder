<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ad Generation Success</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light container text-center my-5">
    <div class="card p-5 shadow-sm max-width-md mx-auto" style="max-width: 600px;">
        <div class="mb-4 text-success">
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" fill="currentColor" class="bi bi-check-circle-fill" viewBox="0 0 16 16">
                <path d="M16 8A8 8 0 1 1 0 8a8 8 0 0 1 16 0zm-3.97-3.03a.75.75 0 0 0-1.08.022L7.477 9.417 5.384 7.323a.75.75 0 0 0-1.06 1.06L6.97 11.03a.75.75 0 0 0 1.079-.02l3.992-4.99a.75.75 0 0 0-.01-1.05z"/>
            </svg>
        </div>
        <h2 class="text-success mb-3">🎉 Ad Successfully Generated!</h2>
        <p class="text-muted mb-4">Your file management window should automatically open to highlight the output file in your <strong>Output/</strong> directory.</p>
        <a href="/" class="btn btn-primary btn-lg w-100">Build Another Video</a>
    </div>

    <button id="kill-app-btn" class="btn btn-danger shadow" style="position: fixed; bottom: 20px; right: 20px; z-index: 10000; border-radius: 8px; font-weight: bold;">
    ⏹ Quit App
    </button>

</body>
</html>

<script>
document.getElementById('kill-app-btn').addEventListener('click', function() {
    if (confirm("Are you sure you want to quit the application?")) {
        fetch('/shutdown', { method: 'POST' })
        .then(() => {
            showClosedScreen();
        })
        .catch(() => {
            showClosedScreen();
        });
    }
});

function showClosedScreen() {
    document.body.innerHTML = `
        <div style='display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; background-color:#1a1a1a; color:white; font-family:sans-serif;'>
            <h2 style='margin-bottom: 10px;'>Application Closed</h2>
            <p style='color: #888;'>The background server has been terminated and the port is free.</p>
            <p style='color: #888;'>You can now safely close this browser tab.</p>
        </div>
    `;
}
</script>
